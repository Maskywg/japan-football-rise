<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百年維新：日本足球的崛起之路</title>
<style>
  :root{
    --bg:#05070d;
    --accent:#3ad6ff;
    --accent2:#ff5577;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;background:var(--bg);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;color:#fff;
  }
  #stage{
    position:relative;width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  #slideImg{
    max-width:100%;max-height:100%;object-fit:contain;
    opacity:0;transition:opacity .6s ease;
    animation:kenburns 9s ease-in-out forwards;
  }
  #slideImg.show{opacity:1;}
  @keyframes kenburns{
    0%{transform:scale(1.0);}
    100%{transform:scale(1.06);}
  }
  #caption{
    position:absolute;left:0;right:0;bottom:0;
    padding:18px 28px 22px;
    background:linear-gradient(transparent, rgba(0,0,0,.85) 55%);
    font-size:1.05rem;line-height:1.6;
    text-shadow:0 2px 6px rgba(0,0,0,.8);
    max-height:30vh;overflow:hidden;
    padding-bottom:64px;
  }
  #caption b{color:var(--accent);}
  #topbar{
    position:absolute;top:0;left:0;right:0;
    padding:14px 20px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(rgba(0,0,0,.75), transparent);
    z-index:5;
  }
  #title{font-weight:700;font-size:1rem;letter-spacing:.5px;flex:1;
    text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
  #progressWrap{
    position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.15);z-index:6;
  }
  #progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s linear;}
  #controls{
    position:absolute;bottom:0;left:0;right:0;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:10px 20px;z-index:6;
    background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  }
  button{
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
    color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;
    font-size:.9rem;backdrop-filter:blur(4px);
  }
  button:hover{background:rgba(255,255,255,.22);}
  #pageInfo{font-size:.85rem;opacity:.8;}
  #voiceSelect{
    background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:6px 8px;font-size:.8rem;max-width:220px;
  }
  #startOverlay{
    position:absolute;inset:0;background:rgba(0,0,0,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;z-index:50;text-align:center;padding:20px;
  }
  #startOverlay h1{font-size:1.6rem;color:var(--accent);}
  #startOverlay p{max-width:520px;opacity:.85;line-height:1.7;font-size:.95rem;}
  #startBtn{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#000;font-weight:700;padding:14px 34px;border-radius:30px;border:none;
    font-size:1.05rem;cursor:pointer;
  }
  .hidden{display:none !important;}
  #rateBox{display:flex;align-items:center;gap:6px;font-size:.8rem;opacity:.85;}
  input[type=range]{width:80px;}
</style>
</head>
<body>

<div id="stage">
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="topbar">
    <div id="title">百年維新：日本足球的崛起之路</div>
    <div id="pageInfo">0 / 0</div>
  </div>

  <img id="slideImg" src="" alt="slide">
  <div id="caption"></div>

  <div id="controls">
    <button id="prevBtn">⏮ 上一張</button>
    <button id="playBtn">▶ 播放</button>
    <button id="nextBtn">下一張 ⏭</button>
    <div id="rateBox">
      語速 <input id="rateRange" type="range" min="0.7" max="1.3" step="0.05" value="0.92">
    </div>
    <select id="voiceSelect"></select>
  </div>

  <div id="startOverlay">
    <h1>⚽ 百年維新：日本足球的崛起之路</h1>
    <p>取材自《Blue Lock 戰術藍圖》與《Japan's Football System Logic》兩份簡報，整理成 30 張投影片的口白解說。<br>
    點擊下方按鈕開始播放 — 系統將使用瀏覽器內建語音朗讀講稿（建議於 Chrome / Safari 開啟，並挑選語速與聲音）。</p>
    <button id="startBtn">▶ 開始播放</button>
  </div>
  <audio id="narrationAudio" preload="auto"></audio>
  <audio id="bgmAudio" src="audio/bgm.mp3" preload="auto" loop></audio>
</div>

<script>
const slides = [

  {img:"images/bluelock-01.png", t:"嫌麻煩天才的終極戰術板：日本足球進化論",

  {img:"images/jfa-02.png", t:"創建帳號：一九六零年代的黃金計劃",

  {img:"images/bluelock-02.png", t:"起點：一個德國老頭帶來的黃金計畫",

  {img:"images/jfa-03.png", t:"伺服器升級：J聯賽的鐵腕革命",

  {img:"images/bluelock-03.png", t:"瘋狂的目標：二零五零世界盃奪冠",

  {img:"images/jfa-04.png", t:"終極主線任務：百年構想與二零五零宣言",

  {img:"images/jfa-05.png", t:"技能樹初期點法：極致的巴西技術",

  {img:"images/bluelock-04.png", t:"戰術打底：吸收巴西的技術與創造力",

  {img:"images/jfa-06.png", t:"Meta轉換：套上歐洲的戰術鎧甲",

  {img:"images/bluelock-05.png", t:"升級防禦：套上德國與荷蘭的結構裝甲",
   n:"於是日本引進德國，注入訓練紀律、整體運作與體能要求；又吸收荷蘭的全攻全守理念，學習空間利用與認知決策。意識上的轉變也隨之發生——不再硬拚身體，而是用戰術結構來抵消體型上的劣勢。"},
  {img:"images/jfa-07.png", t:"專屬流派誕生：二零二二《Japan's Way》",
   n:"拒絕照抄任何一個國家的模式，而是揉合多國優點，再結合本土文化進行制度化改造。巴西技術，加上歐洲紀律，再加上大和民族性，等於日式混合現代足球——帶有高位壓迫與技術細膩的神級組合。二零二二年，日本足協正式發布《Japan's Way》綱領。"},
  {img:"images/bluelock-06.png", t:"最終融合：折衷版的《Japan's Way》",

  {img:"images/bluelock-07.png", t:"人才兵工廠：學校與職業的雙軌並行",

  {img:"images/jfa-08.png", t:"新手村雙路線：校園與職業的無縫接軌",
   n:"路線A是學校體育，靠高中足球聯賽平台，並保留完善的社會化退出機制；路線B是職業青訓梯隊，享有頂級俱樂部資源與高水準競爭實戰。兩條路線隨時平滑過渡，提供最大的安全網與天賦容錯率。"},
  {img:"images/jfa-09.png", t:"升級理念：不急著篩選，先廣撒網",

  {img:"images/bluelock-08.png", t:"拒絕無腦：培養能自己判斷的球員",

  {img:"images/bluelock-09.png", t:"知識轉譯器：S級到D級的教練養成",
   n:"海外的先進觀念輸入之後，要怎麼落地？日本建立了一套嚴謹的認證系統，把觀念轉譯為全國通用標準，從S級到D級層層下沉，最終輸出全國標準化訓練。同時鼓勵教練旅歐進修，再用大賽結果反過來修正國內培訓內容，形成雙向流動。"},
  {img:"images/jfa-10.png", t:"NPC升級系統：嚴謹的教練養成",
   n:"從S-Class、A-Class、B-Class、C-Class，一路到D-Class，建立起嚴謹的教練認證階級。頂尖的海外戰術輸入，被強制下沉到基層新手村，並要求教練定期再培訓，積極推動旅歐進修，讓整個體系持續更新。"},
  {img:"images/jfa-11.png", t:"J.League任務：最高效的人才農場",
   n:"J聯賽的真正定位，其實是人才培育農場——刻意控制薪資上限，反而逼迫年輕球員勇敢赴歐挑戰。同時足協提供全系統的醫療、營養、體能與心理支持，確保天才球員的狀態常駐滿載，大幅降低中途掉隊的風險。"},
  {img:"images/bluelock-10.png", t:"旅歐升級：從技術好變成生存機器",

  {img:"images/jfa-12.png", t:"轉服歐洲：突破物理限制的質變",

  {img:"images/bluelock-11.png", t:"解決拼圖難題：足協的整合系統",
   n:"球員散落在世界各地，要怎麼整合成一支球隊？日本足協確保各級球隊共享同一套戰術哲學，短時間集訓就能建立默契；同時推動J聯賽改為跨年賽制，對齊歐洲主流賽曆，減少徵召衝突；並在德國杜塞爾多夫設立辦事處，即時掌握旅歐球員的傷情與狀態。"},
  {img:"images/jfa-13.png", t:"後台運算優化：消除全歐班的延遲",

  {img:"images/bluelock-12.png", t:"功能大於名目：森保一的變陣魔法",

  {img:"images/jfa-14.png", t:"Boss戰實測：世界盃的功能性彈性",

let idx = 0;
let playing = false;
let voices = [];
const imgEl = document.getElementById('slideImg');
const capEl = document.getElementById('caption');
const pageInfo = document.getElementById('pageInfo');
const progressBar = document.getElementById('progressBar');
const playBtn = document.getElementById('playBtn');
const voiceSelect = document.getElementById('voiceSelect');

function populateVoices(){
  voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  const zh = voices.filter(v => /zh|cmn|yue/i.test(v.lang));
  const list = zh.length ? zh : voices;
  list.forEach((v,i)=>{
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = v.name + ' (' + v.lang + ')';
    voiceSelect.appendChild(o);
  });
  // 預選 Google 國語（臺灣），使用者指定這個聲音
  const preferred = list.find(v => v.name.includes('Google 國語（臺灣）'))
    || list.find(v => /male|男|yunjian|yunyang|云健|云扬|健/i.test(v.name));
  if (preferred) voiceSelect.value = preferred.name;
}
speechSynthesis.onvoiceschanged = populateVoices;
populateVoices();

function renderSlide(i, autoplay){
  const s = slides[i];
  imgEl.classList.remove('show');
  imgEl.style.animation = 'none';
  imgEl.src = s.img;
  void imgEl.offsetWidth;
  imgEl.classList.add('show');
  imgEl.style.animation = 'kenburns 9s ease-in-out forwards';
  capEl.innerHTML = '<b>'+s.t+'</b><br>'+s.n;
  pageInfo.textContent = (i+1) + ' / ' + slides.length;
  progressBar.style.width = ((i)/ (slides.length-1) * 100) + '%';
  if (autoplay) playNarration(i, s.n);
}

const narrationAudio = document.getElementById('narrationAudio');

function audioCandidatesFor(i){
  const num = String(i+1).padStart(2,'0');
  return ['audio/'+num+'.mp3', 'audio/'+num+'.m4a'];
}

function playNarration(i, text){
  speechSynthesis.cancel();
  narrationAudio.pause();
  const candidates = audioCandidatesFor(i);
  tryAudioCandidates(candidates, 0, text);
}

function tryAudioCandidates(candidates, idx, text){
  if (idx >= candidates.length){ speak(text); return; }
  narrationAudio.src = candidates[idx];
  narrationAudio.playbackRate = parseFloat(rateRange.value);
  narrationAudio.onended = () => { if (playing) next(); };
  narrationAudio.onerror = () => { tryAudioCandidates(candidates, idx+1, text); };
  const p = narrationAudio.play();
  if (p && p.catch) p.catch(() => tryAudioCandidates(candidates, idx+1, text));
}

function speak(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const chosen = voices.find(v => v.name === voiceSelect.value);
  if (chosen) { u.voice = chosen; u.lang = chosen.lang; }
  else { u.lang = 'zh-TW'; }
  u.rate = parseFloat(rateRange.value);
  u.pitch = 0.82; // 偏低音調，模擬成熟男聲（只有在沒有音檔可用時才會啟用此備案語音）
  u.onend = () => { if (playing) next(); };
  speechSynthesis.speak(u);
}

function next(){
  if (idx < slides.length - 1){
    idx++;
    renderSlide(idx, true);
  } else {
    playing = false;
    playBtn.textContent = '▶ 重新播放';
  }
}
const bgmAudio = document.getElementById('bgmAudio');
bgmAudio.volume = 0.5;

function stopAll(){
  speechSynthesis.cancel();
  narrationAudio.pause();
}
function prev(){
  stopAll();
  idx = Math.max(0, idx-1);
  renderSlide(idx, playing);
}

document.getElementById('nextBtn').onclick = () => { stopAll(); idx = Math.min(slides.length-1, idx+1); renderSlide(idx, playing); };
document.getElementById('prevBtn').onclick = prev;
playBtn.onclick = () => {
  if (idx === slides.length-1 && !playing){ idx = 0; }
  playing = !playing;
  if (playing){
    playBtn.textContent = '⏸ 暫停';
    renderSlide(idx, true);
    bgmAudio.play().catch(()=>{});
  } else {
    playBtn.textContent = '▶ 播放';
    stopAll();
    bgmAudio.pause();
  }
};

document.getElementById('startBtn').onclick = () => {
  document.getElementById('startOverlay').classList.add('hidden');
  playing = true;
  playBtn.textContent = '⏸ 暫停';
  bgmAudio.currentTime = 0;
  bgmAudio.play().catch(()=>{});
  renderSlide(0, true);
};

renderSlide(0, false);
</script>
</body>
</html>
